services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    restart: "no"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m src.ingestion.etl_v2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./src:/app/src

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn src.serving.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
      - ./models:/app/models

  ui:
    image: python:3.11-slim
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    working_dir: /app
    volumes:
      - ./ui:/app
    command: >-
      bash -c "pip install -q -r requirements.txt &&
               streamlit run app.py
               --server.port=8501
               --server.address=0.0.0.0
               --server.headless=true
               --theme.base=dark"

  # ────────────────────────────────────────────────────────────────────
  # Scheduler: ejecuta el pipeline ETL automaticamente cada dia a las 23:30
  # ────────────────────────────────────────────────────────────────────
  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python /app/scripts/scheduler.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./src:/app/src
      - ./scripts:/app/scripts

  # ────────────────────────────────────────────────────────────────────
  # Grafana: dashboard de metricas con datasource PostgreSQL
  # Acceso: http://localhost:3000  admin / admin
  # ────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/laliga.json
      # Credenciales para el datasource PostgreSQL (leidas en provisioning YAML)
      PG_HOST: db
      PG_PORT: "5432"
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER}
      PG_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  postgres_data:
  grafana_data:
