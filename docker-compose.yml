services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    restart: "no"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m src.ingestion.etl_v2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./src:/app/src

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn src.serving.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
      - ./models:/app/models

  ui:
    image: python:3.11-slim
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    working_dir: /app
    volumes:
      - ./ui:/app
    command: >-
      bash -c "pip install -q -r requirements.txt &&
               streamlit run app.py
               --server.port=8501
               --server.address=0.0.0.0
               --server.headless=true
               --theme.base=dark"

volumes:
  postgres_data:
